<!DOCTYPE html>
<html>

<head>

<title>Funcionários</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:20px;
}

h2{
margin-top:0;
}

form{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

input,select{
padding:10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px;
background:#27ae60;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
grid-column:span 2;
}

button:hover{
background:#219150;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#2c3e50;
color:white;
}

.status{
padding:4px 8px;
border-radius:4px;
font-size:12px;
}

.ativo{
background:#27ae60;
color:white;
}

.inativo{
background:#e74c3c;
color:white;
}

.btn-editar{
background:#2563eb;
color:white;
padding:6px 10px;
border-radius:4px;
text-decoration:none;
font-size:13px;
}

.btn-excluir{
background:#dc2626;
color:white;
padding:6px 10px;
border-radius:4px;
border:none;
font-size:13px;
cursor:pointer;
}

.acao{
display:flex;
gap:8px;
align-items:center;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>👨‍🔧 Cadastro de Funcionário</h2>

<form method="POST">

<input type="text" name="nome" placeholder="Nome">

<input type="text" name="cpf" placeholder="CPF">

<input type="text" name="telefone" placeholder="Telefone">

<input type="text" name="whatsapp" placeholder="WhatsApp">

<input type="text" name="email" placeholder="Email">

<select name="cargo">
<option value="">Cargo</option>
<option value="Tecnico">Técnico</option>
<option value="Vendedor">Vendedor</option>
<option value="Caixa">Caixa</option>
<option value="Gerente">Gerente</option>
<option value="Administrador">Administrador</option>
</select>

<select name="perfil" required>
<option value="funcionario">Perfil: Funcionário</option>
<option value="gerente">Perfil: Gerente</option>
<option value="proprietario">Perfil: Proprietário</option>
</select>

<input type="password" name="senha" placeholder="Senha de acesso" required>

<input type="text" name="funcao" placeholder="Função">

<input type="number" name="comissao" placeholder="Comissão %">

<input type="text" name="endereco" placeholder="Endereço">

<input type="text" name="cidade" placeholder="Cidade">

<button type="submit">Salvar Funcionário</button>

</form>

</div>


<div class="card">

<h2>📋 Funcionários</h2>

<table>

<tr>
<th>ID</th>
<th>Nome</th>
<th>Perfil</th>
<th>Cargo</th>
<th>Telefone</th>
<th>Status</th>
<th>Ação</th>
</tr>

{% for f in funcionarios %}

<tr>

<td>{{ f.id }}</td>

<td>{{ f.nome }}</td>

<td>{{ f.perfil or "funcionario" }}</td>

<td>{{ f.cargo }}</td>

<td>{{ f.telefone }}</td>

<td>
<span class="status ativo">Ativo</span>
</td>

<td>
<div class="acao">
<a class="btn-editar" href="/editar_funcionario/{{ f.id }}">Editar</a>
<form method="POST" action="/excluir_funcionario/{{ f.id }}" onsubmit="return confirm('Excluir funcionário #{{ f.id }}?');">
<button class="btn-excluir" type="submit">Excluir</button>
</form>
</div>
</td>

</tr>

{% endfor %}

</table>

</div>

</div>

</body>

</html>
