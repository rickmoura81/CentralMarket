<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - CentralMarket ERP</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(140deg, #0f172a, #1d4ed8);
            min-height: 100vh;
            display: grid;
            place-items: center;
        }

        .card {
            width: 360px;
            max-width: 92%;
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.25);
        }

        h2 { margin: 0 0 8px; }
        p { margin: 0 0 14px; color: #64748b; font-size: 14px; }

        label { display: block; font-size: 13px; margin-bottom: 5px; color: #334155; }
        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            border: 0;
            border-radius: 8px;
            background: #1d4ed8;
            color: #fff;
            font-weight: bold;
            padding: 10px;
            cursor: pointer;
        }

        .erro {
            background: #fee2e2;
            color: #b91c1c;
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .hint {
            margin-top: 12px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Acesso ao Sistema</h2>
        <p>Entre com CPF e senha.</p>

        {% if erro %}
        <div class="erro">{{ erro }}</div>
        {% endif %}

        <form method="POST">
            <label>CPF</label>
            <input type="text" name="cpf" placeholder="Somente numeros" required>

            <label>Senha</label>
            <input type="password" name="senha" required>

            <button type="submit">Entrar</button>
        </form>

        <div class="hint">Usuario inicial: CPF `00000000000` | Senha `admin123`</div>
    </div>
</body>
</html>
