<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Agenda de Serviços</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales/pt-br.global.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

#calendar{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.filtro{
margin-bottom:15px;
}

.atalhos{
display:flex;
gap:8px;
align-items:center;
flex-wrap:wrap;
margin-bottom:12px;
}

.atalhos input,
.atalhos button{
padding:7px 10px;
border:1px solid #cbd5e1;
border-radius:6px;
font-size:14px;
}

.atalhos button{
background:#0f766e;
color:#fff;
border-color:#0f766e;
cursor:pointer;
}

.fc-timegrid-event {
min-height: 70px;
}

.fc-event{
font-size:11px;
white-space:normal;
line-height:1.2;
padding:4px;
}

.fc-event-title{
white-space:normal;
}

.legenda{
display:flex;
gap:12px;
margin:10px 0 14px;
font-size:13px;
color:#334155;
flex-wrap:wrap;
}

.dot{
display:inline-block;
width:10px;
height:10px;
border-radius:50%;
margin-right:6px;
vertical-align:middle;
}

</style>

</head>

<body>

<h2>📅 Agenda de Serviços</h2>

<div class="filtro">

<select id="tecnicoFiltro">

<option value="">Todos os técnicos</option>

{% for t in tecnicos %}
<option value="{{ t.id }}">{{ t.nome }}</option>
{% endfor %}

</select>

</div>

<div class="atalhos">
<label for="irData"><strong>Ir para data:</strong></label>
<input type="date" id="irData">
<button type="button" id="btnIrData">Ir</button>
</div>

<div class="legenda">
<div><span class="dot" style="background:#f59e0b;"></span>Agendado</div>
<div><span class="dot" style="background:#fb923c;"></span>Em Atendimento</div>
<div><span class="dot" style="background:#16a34a;"></span>Finalizado</div>
</div>

<div id="calendar"></div>

<script>

document.addEventListener('DOMContentLoaded', function() {

let calendarEl = document.getElementById('calendar')
let isMobile = window.innerWidth <= 768

let calendar = new FullCalendar.Calendar(calendarEl, {

initialView:isMobile ? 'timeGridDay' : 'timeGridWeek',

locale:'pt-br',

headerToolbar:{
left:'prev,next today',
center:'title',
right:'dayGridMonth,timeGridWeek,timeGridDay'
},

buttonText:{
today:'Hoje',
month:'Mês',
week:'Semana',
day:'Dia'
},

events:function(fetchInfo, successCallback){

let tecnico = document.getElementById("tecnicoFiltro").value

fetch("/eventos_agenda?tecnico="+encodeURIComponent(tecnico))
.then(res => res.json())
.then(data => {
const eventos = (data || []).map(ev => {
let cor = "#f59e0b";
if(ev.status === "Em Atendimento") cor = "#fb923c";
if(ev.status === "Finalizado") cor = "#16a34a";
return {
...ev,
backgroundColor: cor,
borderColor: cor,
textColor: "#ffffff"
};
});
successCallback(eventos);
})

},

editable:true,

eventDrop:function(info){

if(!confirm("Confirmar alteração de data/hora deste atendimento?")){
info.revert()
return
}

let dataHora = info.event.startStr

fetch("/mover_evento",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
id:info.event.id,
data:dataHora
})

})
.then(r => r.json())
.then(j => {
if(!j.ok){
alert(j.erro || "Nao foi possivel mover o evento.")
info.revert()
}
})
.catch(() => {
alert("Falha de conexao ao mover evento.")
info.revert()
})

},

eventContent:function(info){

let cliente = info.event.extendedProps.cliente || ""
let tecnico = info.event.extendedProps.tecnico || ""
let status = info.event.extendedProps.status || ""

let hora = info.timeText

let html = `
<div>

<div><b>${hora}</b></div>
<div>${info.event.title}</div>
<div>👤 ${cliente}</div>
<div>👨‍🔧 ${tecnico}</div>
<div>📌 ${status}</div>

</div>
`

return { html: html }

},

eventClick:function(info){
const acao = prompt("Digite:\n1 = Abrir OS\n2 = Alterar apenas a data", "2")
if(!acao) return
const escolha = acao.trim()
if(escolha === "1"){
window.location.href="/ordem/"+info.event.id
return
}
if(escolha !== "2"){
alert("Opcao invalida.")
return
}

const dataAtual = info.event.startStr.split("T")[0]
const novaData = prompt("Nova data (AAAA-MM-DD):", dataAtual)
if(!novaData) return
if(!/^\d{4}-\d{2}-\d{2}$/.test(novaData.trim())){
alert("Data invalida. Use o formato AAAA-MM-DD.")
return
}

let payloadData = novaData.trim()
const horaAtual = (info.event.startStr.split("T")[1] || "").slice(0,5)
if(horaAtual){
payloadData = `${payloadData}T${horaAtual}`
}

fetch("/mover_evento",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
id:info.event.id,
data:payloadData
})
})
.then(r => r.json())
.then(j => {
if(!j.ok){
alert(j.erro || "Nao foi possivel alterar a data.")
return
}
calendar.refetchEvents()
})
.catch(() => {
alert("Falha de conexao ao alterar data.")
})

}

})

calendar.render()

const inputIrData = document.getElementById("irData")
const btnIrData = document.getElementById("btnIrData")

function irParaDataSelecionada(){
const valor = (inputIrData.value || "").trim()
if(!valor) return
calendar.gotoDate(valor)
}

btnIrData.addEventListener("click", irParaDataSelecionada)
inputIrData.addEventListener("keydown", function(ev){
if(ev.key === "Enter"){
ev.preventDefault()
irParaDataSelecionada()
}
})

document.getElementById("tecnicoFiltro").addEventListener("change", function(){

calendar.refetchEvents()

})

})

</script>

</body>
</html>
