<!DOCTYPE html>
<html>
<head>
    <title>Pedidos Pendentes</title>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #2c3e50;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        tr:hover {
            background: #f2f2f2;
        }

        a {
            text-decoration: none;
            background: #27ae60;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
        }

        /* destaque pedido novo */
        .novo {
            background-color: #fff3cd;
            animation: piscar 1s ease-in-out 3;
        }

        @keyframes piscar {
            0% { background-color: #fff3cd; }
            50% { background-color: #ffe08a; }
            100% { background-color: #fff3cd; }
        }
    </style>
</head>
<body>

<h2>🧾 Pedidos Pendentes</h2>

<table>
    <thead>
        <tr>
            <th>Pedido</th>
            <th>Total</th>
            <th>Ação</th>
        </tr>
    </thead>
    <tbody id="listaPedidos"></tbody>
</table>

<br>
<a href="/">⬅ Voltar</a>

<script>
let pedidosAnteriores = [];

function carregarPedidos() {
    fetch("/pedidos_pendentes")
    .then(res => res.json())
    .then(data => {

        const tbody = document.getElementById("listaPedidos");
        tbody.innerHTML = "";

        data.pedidos.forEach(p => {

            const novo = !pedidosAnteriores.includes(p.id);
            const classe = novo ? "novo" : "";

            tbody.innerHTML += `
                <tr class="${classe}">
                    <td>${p.id}</td>
                    <td>R$ ${parseFloat(p.total).toFixed(2)}</td>
                    <td>
                        <a href="/ver_pedido/${p.id}">Ver</a>
                    </td>
                </tr>
            `;
        });

        pedidosAnteriores = data.pedidos.map(p => p.id);
    });
}

// atualiza automaticamente
setInterval(carregarPedidos, 4000);

// carrega ao abrir a página
carregarPedidos();
</script>

</body>
</html>
