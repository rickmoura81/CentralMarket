{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Configuração de Descontos</h2>
    <p>Defina os limites de desconto por perfil.</p>

    <form method="POST" style="max-width:780px;display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div style="grid-column:span 2;"><strong>Limites do Funcionário (sem autorização)</strong></div>

        <div>
            <label>Máximo (%)</label>
            <input type="number" step="0.01" min="0" name="limite_funcionario_percent" value="{{ cfg.limite_funcionario_percent if cfg else 5 }}">
        </div>
        <div>
            <label>Máximo (R$)</label>
            <input type="number" step="0.01" min="0" name="limite_funcionario_valor" value="{{ cfg.limite_funcionario_valor if cfg else 50 }}">
        </div>

        <div style="grid-column:span 2;"><strong>Limites do Gerente</strong></div>
        <div>
            <label>Máximo (%)</label>
            <input type="number" step="0.01" min="0" name="limite_gerente_percent" value="{{ cfg.limite_gerente_percent if cfg else 15 }}">
        </div>
        <div>
            <label>Máximo (R$)</label>
            <input type="number" step="0.01" min="0" name="limite_gerente_valor" value="{{ cfg.limite_gerente_valor if cfg else 200 }}">
        </div>

        <div style="grid-column:span 2;"><strong>Limites do Proprietário</strong></div>
        <div>
            <label>Máximo (%)</label>
            <input type="number" step="0.01" min="0" name="limite_proprietario_percent" value="{{ cfg.limite_proprietario_percent if cfg else 100 }}">
        </div>
        <div>
            <label>Máximo (R$)</label>
            <input type="number" step="0.01" min="0" name="limite_proprietario_valor" value="{{ cfg.limite_proprietario_valor if cfg else 999999 }}">
        </div>

        <div style="grid-column:span 2;display:flex;gap:10px;flex-wrap:wrap;">
            <button type="submit">Salvar Configuração</button>
            <a href="/" style="text-decoration:none;"><button type="button">Voltar</button></a>
        </div>
    </form>
</div>
{% endblock %}
