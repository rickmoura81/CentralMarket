<!DOCTYPE html>
<html>

<head>
<title>Agenda de Hoje</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#27ae60;
color:white;
}

.status{
background:#3498db;
color:white;
padding:4px 8px;
border-radius:4px;
}

</style>

</head>

<body>

<h2>📅 Agenda de Serviços - {{ hoje }}</h2>

<table>

<tr>
<th>ID</th>
<th>Serviço</th>
<th>Status</th>
</tr>

{% for os in ordens %}

<tr>

<td>{{ os.id }}</td>

<td>{{ os.servico_nome }}</td>

<td>
<span class="status">{{ os.status }}</span>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
